name: superlinter

on:
  push:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.0.5

      - name: Install libs
        run: |
          haxe -version
          haxelib install hxnodejs -always

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.0.5

      - name: Install libs
        run: |
          haxe -version
          haxelib install hxnodejs -always
