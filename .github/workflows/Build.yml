name: FNF Full Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:

# =====================================
# 🪟 WINDOWS BUILD (CORRETO)
# =====================================
  fnf_windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1.5.1
        with:
          haxe-version: 4.3.6

      - name: Setup Haxelib
        run: |
          haxelib setup C:\haxelib

      - name: Install Dependencies
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui --quiet
          haxelib install hscript --quiet
          haxelib install newgrounds 1.1.5 --quiet

      - name: Build Windows
        run: |
          haxelib run lime build windows -release

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: FNF-Windows
          path: export/release/windows/bin/


# =====================================
# 📱 ANDROID BUILD (LINUX)
# =====================================
  fnf_android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1.5.1
        with:
          haxe-version: 4.3.6

      - name: Setup Haxelib
        run: |
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib

      - name: Install Dependencies
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-ui --quiet
          haxelib install hscript --quiet
          haxelib install newgrounds 1.1.5 --quiet

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Configure Android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT "$ANDROID_SDK_ROOT/ndk/25.2.9519653"
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Build Android
        run: |
          haxelib run lime build android -release

      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: FNF-Android
          path: export/release/android/bin/app/build/outputs/apk/debug/*.apk
